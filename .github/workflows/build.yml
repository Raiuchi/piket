name: Build APK

run-name: ${{ startsWith(github.ref, 'refs/tags/v') && format('🚀 Релиз ПИКЕТ {0}', github.ref_name) || '🔧 Тестовая сборка' }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        env:
          PIKET_KEYSTORE_PASSWORD: ${{ secrets.PIKET_KEYSTORE_PASSWORD }}
          PIKET_KEY_ALIAS: ${{ secrets.PIKET_KEY_ALIAS }}
          PIKET_KEY_PASSWORD: ${{ secrets.PIKET_KEY_PASSWORD }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/piket.apk

      # Артефакт только на релизный тег, хранится 7 дней
      # На обычных пушах не заливаем — они копились бесполезно (79 штук за день)
      - name: Upload artifact (only on release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: piket-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/piket.apk
          retention-days: 7

      - name: Build release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          COMMIT_TITLE=$(git log -1 --pretty=format:"%s")
          COMMIT_BODY=$(git log -1 --pretty=format:"%b")
          {
            echo "## 📦 ПИКЕТ $VERSION"
            echo ""
            echo "### Что изменилось"
            echo ""
            echo "**$COMMIT_TITLE**"
            echo ""
            if [ -n "$COMMIT_BODY" ]; then
              echo "$COMMIT_BODY"
              echo ""
            fi
            if [ -n "$PREV_TAG" ]; then
              echo "### Все коммиты с $PREV_TAG"
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20
              echo ""
              echo ""
            fi
            echo "---"
            echo "### Установка"
            echo "Скачай **piket.apk** ниже и установи поверх предыдущей версии. Данные сохранятся."
            echo ""
            echo "> ⚠️ Помощник, не замена АЛСН/КЛУБ-У."
          } > /tmp/release_notes.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "ПИКЕТ ${{ github.ref_name }}"
          files: app/build/outputs/apk/debug/piket.apk
          body_path: /tmp/release_notes.txt

      - name: Cleanup — удаляем старые релизы (оставляем 5) и артефакты
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Релизы: оставляем 5 ==="
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            --jq '.[].tagName' | tail -n +6 | while read TAG; do
            [ -n "$TAG" ] && echo "Удаляю релиз $TAG" && \
              gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag || true
          done

          echo "=== Артефакты: удаляем все кроме последних 5 ==="
          gh api repos/${{ github.repository }}/actions/artifacts --paginate \
            --jq '.artifacts[] | "\(.id) \(.name) \(.created_at)"' | \
            sort -k3 -r | tail -n +6 | awk '{print $1}' | while read ID; do
            [ -n "$ID" ] && echo "Удаляю артефакт $ID" && \
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$ID || true
          done

          echo "=== Итого ==="
          echo "Релизов осталось: $(gh release list --repo ${{ github.repository }} --limit 100 | wc -l)"
          echo "Артефактов осталось: $(gh api repos/${{ github.repository }}/actions/artifacts --jq '.total_count')"
