name: Build APK

run-name: ${{ startsWith(github.ref, 'refs/tags/v') && format('🚀 Релиз ПИКЕТ {0}', github.ref_name) || '🔧 Тестовая сборка' }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужно для истории коммитов в release notes

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        env:
          PIKET_KEYSTORE_PASSWORD: ${{ secrets.PIKET_KEYSTORE_PASSWORD }}
          PIKET_KEY_ALIAS: ${{ secrets.PIKET_KEY_ALIAS }}
          PIKET_KEY_PASSWORD: ${{ secrets.PIKET_KEY_PASSWORD }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/piket.apk

      - name: Upload build artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: piket-apk
          path: app/build/outputs/apk/debug/piket.apk

      - name: Get version info
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          # Версия из тега
          VERSION="${{ github.ref_name }}"

          # Берём сообщение последнего коммита (первую строку — заголовок)
          COMMIT_TITLE=$(git log -1 --pretty=format:"%s")

          # Берём расширенное описание коммита (тело, без первой строки)
          COMMIT_BODY=$(git log -1 --pretty=format:"%b")

          # Предыдущий тег — для списка изменений между версиями
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_title=$COMMIT_TITLE" >> $GITHUB_OUTPUT

          # Записываем тело коммита в файл (многострочное)
          echo "$COMMIT_BODY" > /tmp/commit_body.txt
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Build release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          COMMIT_TITLE="${{ steps.version.outputs.commit_title }}"
          COMMIT_BODY=$(cat /tmp/commit_body.txt)

          # Формируем красивый changelog
          {
            echo "## 📦 ПИКЕТ $VERSION"
            echo ""
            echo "### Что изменилось"
            echo ""
            # Заголовок коммита как главное изменение
            echo "**$COMMIT_TITLE**"
            echo ""
            # Тело коммита если есть
            if [ -n "$COMMIT_BODY" ]; then
              echo "$COMMIT_BODY"
              echo ""
            fi
            # Список всех коммитов между предыдущим и текущим тегом
            if [ -n "$PREV_TAG" ]; then
              echo "### Все коммиты с $PREV_TAG"
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20
              echo ""
              echo ""
            fi
            echo "---"
            echo "### Установка"
            echo "Скачай **piket.apk** ниже и установи поверх предыдущей версии. Данные и настройки сохранятся."
            echo ""
            echo "> ⚠️ Помощник, не замена АЛСН/КЛУБ-У. Решения принимаются машинистом на основании штатных приборов."
          } > /tmp/release_notes.txt

          cat /tmp/release_notes.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "ПИКЕТ ${{ github.ref_name }}"
          files: app/build/outputs/apk/debug/piket.apk
          body_path: /tmp/release_notes.txt

      - name: Cleanup old releases (keep last 5)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Получаем все релизы отсортированные по дате (новые первые)
          RELEASES=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName,databaseId --jq '.[].tagName')

          # Считаем количество
          TOTAL=$(echo "$RELEASES" | wc -l)
          echo "Всего релизов: $TOTAL, оставляем 5, удаляем $((TOTAL - 5))"

          # Удаляем все кроме первых 5
          echo "$RELEASES" | tail -n +6 | while read TAG; do
            if [ -n "$TAG" ]; then
              echo "Удаляю релиз: $TAG"
              gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag || true
            fi
          done

          echo "Готово. Осталось релизов: $(gh release list --repo ${{ github.repository }} --limit 100 | wc -l)"
