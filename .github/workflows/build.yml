name: Build APK

run-name: ${{ startsWith(github.ref, 'refs/tags/v') && format('🚀 Релиз ПИКЕТ {0}', github.ref_name) || '🔧 Тестовая сборка' }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ПИКЕТ.apk

      - name: Upload build artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: piket-apk
          path: app/build/outputs/apk/debug/ПИКЕТ.apk

      - name: Create GitHub Release (only on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "ПИКЕТ ${{ github.ref_name }}"
          files: app/build/outputs/apk/debug/ПИКЕТ.apk
          generate_release_notes: true
