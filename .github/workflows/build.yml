name: Build APK

run-name: ${{ startsWith(github.ref, 'refs/tags/v') && format('🚀 Релиз ПИКЕТ {0}', github.ref_name) || '🔧 Тестовая сборка' }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        env:
          PIKET_KEYSTORE_PASSWORD: ${{ secrets.PIKET_KEYSTORE_PASSWORD }}
          PIKET_KEY_ALIAS: ${{ secrets.PIKET_KEY_ALIAS }}
          PIKET_KEY_PASSWORD: ${{ secrets.PIKET_KEY_PASSWORD }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/piket.apk

      - name: Upload build artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: piket-apk
          path: app/build/outputs/apk/debug/piket.apk

      - name: Create GitHub Release (only on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "ПИКЕТ ${{ github.ref_name }}"
          files: app/build/outputs/apk/debug/piket.apk
          body: |
            ## ⚠️ Важно при обновлении с версии v1.0.0

            Если у тебя уже установлен ПИКЕТ версии **v1.0.0** — Android не даст поставить эту версию поверх старой (поменялся ключ подписи). Нужно один раз:

            1. **Удалить** старое приложение ПИКЕТ с телефона
            2. Скачать и установить **ПИКЕТ.apk** из этого релиза

            Это нужно сделать **только один раз**. Начиная с этой версии у приложения постоянный ключ подписи — все будущие обновления будут ставиться поверх старых, без удаления.

            Если ПИКЕТ у тебя ещё не стоял — просто скачай и установи как обычно, ничего удалять не нужно.

            ## Что нового
            - 🔊 Голос — исправлена озвучка ограничений (использует системный движок Android)
            - 📳 Вибрация — починена (не хватало системного разрешения)
            - 🔑 Постоянный ключ подписи — обновления больше не требуют удаления
            - 🎛 Спидометр — насечки на циферблате + индикатор допустимой скорости по ограничению
            - 🧹 Убрана техническая метка сборки и случайное выделение текста на экране
          generate_release_notes: true
